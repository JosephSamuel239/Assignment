<!DOCTYPE html>
<html>
<head>
    <title>Authentication Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h2>User Authentication</h2>
    <form id="loginForm">
        <input
            type="email"
            id="email"
            placeholder="Enter Email"
            required
        >
        <input
            type="password"
            id="password"
            placeholder="Enter Password"
            required
        >
        <button type="submit">
            Register/Login
        </button>
    </form>
    <p id="message"></p>
    <h3>Registered Users</h3>
    <ul id="userList"></ul>
</div>
<script src="script.js"></script>
</body>
</html>
